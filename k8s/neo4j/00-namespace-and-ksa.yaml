# ============================================================================
# File: k8s/neo4j/00-namespace-and-ksa.yaml
# Author: Thaddeus Haffey — Executive Architect, Haffey Enterprises LLC
# Created: 2026-07-14 / Revised: 2026-07-14
# Description: The neo4j namespace and the Kubernetes ServiceAccount the Neo4j
#   pod runs as. The KSA is bound to the Neo4j GSA via Workload Identity — annotate
#   it with the module output `neo4j_gsa_email` (no k8s Secret holds the GSA key).
# ============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: neo4j
  labels:
    app: neo4j
    environment: dev
    managed-by: terraform
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: neo4j
  namespace: neo4j
  labels:
    app: neo4j
    environment: dev
    managed-by: terraform
  annotations:
    # terraform output `neo4j_gsa_email`
    iam.gke.io/gcp-service-account: neo4j-graph-dev@sofia-dev-he.iam.gserviceaccount.com
