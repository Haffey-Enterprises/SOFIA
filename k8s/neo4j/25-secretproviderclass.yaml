# ============================================================================
# File: k8s/neo4j/25-secretproviderclass.yaml
# Author: Thaddeus Haffey — Executive Architect, Haffey Enterprises LLC
# Created: 2026-07-14 / Revised: 2026-07-14
# Description: Secret Manager CSI projection of NEO4J_AUTH into the pod as a FILE
#   (SDD-001 §4.6 — creds via Secret Manager + Workload Identity, never a k8s
#   Secret). Requires the Secrets Store CSI driver + GCP provider installed on
#   the cluster (an operator prerequisite; see helpers/README).
# ============================================================================
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: neo4j-auth
  namespace: neo4j
  labels:
    app: neo4j
    managed-by: terraform
spec:
  provider: gcp
  parameters:
    secrets: |
      - resourceName: "projects/sofia-dev-he/secrets/neo4j-auth-dev/versions/latest"
        fileName: "neo4j-auth"
