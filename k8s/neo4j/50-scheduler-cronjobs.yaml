# ============================================================================
# File: k8s/neo4j/50-scheduler-cronjobs.yaml
# Author: Thaddeus Haffey — Executive Architect, Haffey Enterprises LLC
# Created: 2026-07-14 / Revised: 2026-07-14
# Description: Shutdown/startup scheduler for the dev threshold instance (RBT-58
#   added scope). Two CronJobs scale the StatefulSet 0<->1; the graph node pool's
#   autoscaler (min 0) then drains/adds the node — the cost lever. The CronJobs
#   run on the always-on SYSTEM pool (they carry no graph-pool toleration), so
#   the scale-UP job always has a node even when the graph pool is at zero.
#
#   Data safety: scaling to 0 deletes the POD, never the PVC (04 §3 — persistent
#   volumes survive; reclaimPolicy: Retain). Startup rehydrates from the same disk.
#
#   Schedules are America/New_York (spec.timeZone; requires k8s >= 1.27). Adjust
#   to taste — down at 22:00 daily, up at 07:00 on weekdays.
# ============================================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: neo4j-scale-down
  namespace: neo4j
  labels:
    app: neo4j
    managed-by: terraform
spec:
  schedule: "0 22 * * *"
  timeZone: America/New_York
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: neo4j
            job: scale-down
        spec:
          serviceAccountName: neo4j-scaler
          restartPolicy: OnFailure
          containers:
            - name: kubectl
              image: bitnami/kubectl:1.30
              command:
                - kubectl
                - scale
                - statefulset/neo4j
                - --namespace=neo4j
                - --replicas=0
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: neo4j-scale-up
  namespace: neo4j
  labels:
    app: neo4j
    managed-by: terraform
spec:
  schedule: "0 7 * * 1-5"
  timeZone: America/New_York
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: neo4j
            job: scale-up
        spec:
          serviceAccountName: neo4j-scaler
          restartPolicy: OnFailure
          containers:
            - name: kubectl
              image: bitnami/kubectl:1.30
              command:
                - kubectl
                - scale
                - statefulset/neo4j
                - --namespace=neo4j
                - --replicas=1
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
