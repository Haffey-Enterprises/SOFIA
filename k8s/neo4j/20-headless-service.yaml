# ============================================================================
# File: k8s/neo4j/20-headless-service.yaml
# Author: Thaddeus Haffey — Executive Architect, Haffey Enterprises LLC
# Created: 2026-07-14 / Revised: 2026-07-14
# Description: Headless Service (clusterIP: None) giving the StatefulSet stable
#   per-pod network identity (04 §3). bolt (7687) for the driver, http (7474) for
#   ops/Browser. Internal only — no LoadBalancer; the sole-owner gateway
#   (knowledge-service, ADR-002 §2.5) reaches bolt over the VPC.
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: neo4j
  labels:
    app: neo4j
    environment: dev
    managed-by: terraform
spec:
  clusterIP: None
  selector:
    app: neo4j
  ports:
    - name: bolt
      port: 7687
      targetPort: 7687
    - name: http
      port: 7474
      targetPort: 7474
