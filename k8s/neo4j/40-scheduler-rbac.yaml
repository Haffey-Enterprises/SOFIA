# ============================================================================
# File: k8s/neo4j/40-scheduler-rbac.yaml
# Author: Thaddeus Haffey — Executive Architect, Haffey Enterprises LLC
# Created: 2026-07-14 / Revised: 2026-07-14
# Description: Least-privilege in-cluster identity for the scale-up/down CronJobs.
#   Scoped to exactly one verb-set on one resource: scale the neo4j StatefulSet.
#   Namespaced Role (not ClusterRole) — the scaler can touch nothing else.
# ============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: neo4j-scaler
  namespace: neo4j
  labels:
    app: neo4j
    managed-by: terraform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: neo4j-scaler
  namespace: neo4j
  labels:
    app: neo4j
    managed-by: terraform
rules:
  - apiGroups: ["apps"]
    resources: ["statefulsets", "statefulsets/scale"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: neo4j-scaler
  namespace: neo4j
  labels:
    app: neo4j
    managed-by: terraform
subjects:
  - kind: ServiceAccount
    name: neo4j-scaler
    namespace: neo4j
roleRef:
  kind: Role
  name: neo4j-scaler
  apiGroup: rbac.authorization.k8s.io
