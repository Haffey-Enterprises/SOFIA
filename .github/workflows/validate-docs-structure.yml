# Documentation-structure conformance gate (RBT-50).
# Runs scripts/validate-docs-structure.sh — diff-scoped on pull requests, full-corpus
# on pushes. This is the only job in this workflow: the validator gate, nothing else.
name: validate-docs-structure

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  validate-docs-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the PR base SHA resolves for diff-scoped validation
      - name: Validate documentation structure
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bash scripts/validate-docs-structure.sh --base "${{ github.event.pull_request.base.sha }}"
          else
            bash scripts/validate-docs-structure.sh --all
          fi
